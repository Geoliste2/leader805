// ── Image compression ───────────────────────────────────────────────────────
const compressImage=file=>new Promise(resolve=>{
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1400;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.78));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
});

  const[code,setCode]=useState('');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');

    if(!code.trim())return;
    setLoading(true);setError('');
    try{
      const{error:err}=await db.from('trips').select('id').eq('boat_code',code.toUpperCase()).limit(1);

// ── App ─────────────────────────────────────────────────────────────────────
function App(){
  const saved=localStorage.getItem(CODE_KEY);
  const[boatCode,setBoatCode]=useState(saved||'');
  const[tab,setTab]=useState(0);
  const[trips,setTrips]=useState([]);
  const[expenses,setExpenses]=useState([]);
  const[docs,setDocs]=useState([]);
  const[view,setView]=useState('list');
  const[editItem,setEditItem]=useState(null);
  const[loading,setLoading]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const[online,setOnline]=useState(navigator.onLine);

  useEffect(()=>{
    const on=()=>setOnline(true),off=()=>setOnline(false);
    window.addEventListener('online',on);window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  const loadAll=useCallback(async code=>{
    if(!code)return;
    setLoading(true);
    try{
      const[{data:t},{data:e}]=await Promise.all([
        db.from('trips').select('*').eq('boat_code',code).order('created_at',{ascending:true}),
        db.from('expenses').select('*').eq('boat_code',code).order('created_at',{ascending:true}),
      ]);
      if(t)setTrips(t.map(r=>({...r.data,id:r.id})));
      if(e)setExpenses(e.map(r=>({...r.data,id:r.id})));
    }catch(err){console.error('trips/expenses load error',err);}
    // Documents chargés séparément — table optionnelle
    try{
      const{data:d}=await db.from('documents').select('*').eq('boat_code',code);
      if(d)setDocs(d);
    }catch{}
    setLoading(false);
  },[]);

  useEffect(()=>{if(boatCode)loadAll(boatCode);},[boatCode]);

  // Temps réel Supabase
  useEffect(()=>{
    if(!boatCode)return;
    const ch=db.channel('boat-'+boatCode)
      .on('postgres_changes',{event:'*',schema:'public',table:'trips',filter:`boat_code=eq.${boatCode}`},()=>loadAll(boatCode))
      .on('postgres_changes',{event:'*',schema:'public',table:'expenses',filter:`boat_code=eq.${boatCode}`},()=>loadAll(boatCode))
      .subscribe();
    // Fallback polling toutes les 30s si realtime ne reçoit rien
    const poll=setInterval(()=>loadAll(boatCode),30000);
    return()=>{ch.unsubscribe();clearInterval(poll);};
  },[boatCode]);

  const upsertTrip=async trip=>{
    setSyncing(true);
    setTrips(p=>p.find(t=>t.id===trip.id)?p.map(t=>t.id===trip.id?trip:t):[...p,trip]);
    await db.from('trips').upsert({id:trip.id,boat_code:boatCode,data:trip,updated_at:new Date().toISOString()});
    setSyncing(false);
  };

  const deleteTrip=async id=>{
    setTrips(p=>p.filter(t=>t.id!==id));
    await db.from('trips').delete().eq('id',id);
  };

  const upsertExpense=async expense=>{
    setSyncing(true);
    setExpenses(p=>p.find(e=>e.id===expense.id)?p.map(e=>e.id===expense.id?expense:e):[...p,expense]);
    await db.from('expenses').upsert({id:expense.id,boat_code:boatCode,data:expense,updated_at:new Date().toISOString()});
    setSyncing(false);
  };

  const deleteExpense=async id=>{
    setExpenses(p=>p.filter(e=>e.id!==id));
    await db.from('expenses').delete().eq('id',id);
  };

  const upsertDoc=async doc=>{
    setDocs(p=>p.find(d=>d.id===doc.id)?p.map(d=>d.id===doc.id?doc:d):[...p,doc]);
    await db.from('documents').upsert({...doc,boat_code:boatCode,updated_at:new Date().toISOString()});
  };

  const deleteDoc=async id=>{
    setDocs(p=>p.filter(d=>d.id!==id));
    await db.from('documents').delete().eq('id',id);
  };

  const navTo=i=>{setTab(i);setView('list');setEditItem(null);};

  if(!boatCode)return<LoginScreen onLogin={setBoatCode}/>;

  const totalExp=expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const totalHours=trips.reduce((s,t)=>{const h=(parseFloat(t.engineEnd)||0)-(parseFloat(t.engineStart)||0);return s+(h>0?h:0);},0);

  const TABS=[{icon:'⚓',label:'Accueil'},{icon:'📓',label:'Carnet'},{icon:'💶',label:'Dépenses'},{icon:'📋',label:'Admin'},{icon:'🆘',label:'Urgences'}];

  return(
    <div style={{maxWidth:430,margin:'0 auto',height:'100vh',display:'flex',flexDirection:'column',background:'#F5F6F8'}}>
      {/* Header */}
      <div style={{background:'#0B2845',color:'white',padding:'12px 18px 10px',flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:10,opacity:.6,letterSpacing:'.12em',textTransform:'uppercase'}}>Jeanneau Leader 805</div>
            <div style={{fontSize:16,fontWeight:700}}>{TABS[tab].icon} {TABS[tab].label}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {syncing&&<div style={{fontSize:10,opacity:.7}}>↑ sync…</div>}
            <div style={{width:8,height:8,borderRadius:4,background:online?'#4CAF50':'#EF5350'}}/>
            <div style={{fontSize:10,opacity:.6}}>{boatCode}</div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="scroll" style={{flex:1,paddingBottom:70}}>
        {loading&&!trips.length&&!expenses.length?(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:300,gap:12}}>
            <div style={{fontSize:40}}>⚓</div>
            <div style={{fontSize:13,color:'#888'}}>Chargement…</div>
          </div>
        ):(
          <>
            {tab===0&&<Dashboard trips={trips} expenses={expenses} totalHours={totalHours} totalExp={totalExp} navTo={navTo} boatCode={boatCode}/>}
            {tab===1&&<LogbookTab trips={trips} upsertTrip={upsertTrip} deleteTrip={deleteTrip} view={view} setView={setView} editItem={editItem} setEditItem={setEditItem}/>}
            {tab===2&&<ExpensesTab expenses={expenses} upsertExpense={upsertExpense} deleteExpense={deleteExpense} view={view} setView={setView} editItem={editItem} setEditItem={setEditItem} totalExp={totalExp} boatCode={boatCode}/>}
            {tab===3&&<AdminTab docs={docs} upsertDoc={upsertDoc} deleteDoc={deleteDoc}/>}
            {tab===4&&<EmergencyTab/>}
          </>
        )}
      </div>

      {/* Bottom nav */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:'white',borderTop:'1px solid #E0E0E0',display:'flex',zIndex:200,paddingBottom:'env(safe-area-inset-bottom)'}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>navTo(i)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'8px 4px 10px',background:'none',border:'none',cursor:'pointer',color:tab===i?'#0B2845':'#999',fontFamily:'inherit'}}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===i?700:400}}>{t.label}</span>
            {tab===i&&<div style={{width:20,height:2,borderRadius:1,background:'#0B2845'}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const windDir=d=>{const dirs=['N','NE','E','SE','S','SO','O','NO'];return dirs[Math.round(d/45)%8];};

const bftColor=k=>{if(k<16)return'#2E7D32';if(k<22)return'#F57C00';if(k<28)return'#E65100';return'#C62828';};

function WeatherCard(){
  const[w,setW]=useState(null);
  const[err,setErr]=useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        // Coordonnées centre zone navigation : Carro / Côte Bleue
        const LAT=43.33,LNG=5.03;
        const[meteo,marine]=await Promise.all([
          fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LNG}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&wind_speed_unit=kn&timezone=Europe%2FParis`).then(r=>r.json()),
          fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LNG}&current=wave_height,swell_wave_height&timezone=Europe%2FParis`).then(r=>r.json()),
        ]);
        setW({
          temp:Math.round(meteo.current.temperature_2m),
          wind:Math.round(meteo.current.wind_speed_10m),
          windDir:meteo.current.wind_direction_10m,
          code:meteo.current.weather_code,
          wave:(marine.current?.wave_height||0).toFixed(1),
          swell:(marine.current?.swell_wave_height||0).toFixed(1),
          time:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
        });
      }catch{setErr(true);}
    })();
  },[]);

  if(err)return(
    <div style={{background:'white',borderRadius:12,padding:14,marginBottom:14,border:'1px solid #E8E8E8',textAlign:'center'}}>
      <div style={{fontSize:12,color:'#888'}}>🌊 Météo marine indisponible — vérifiez votre connexion</div>
    </div>
  );

  if(!w)return(
    <div style={{background:'white',borderRadius:12,padding:14,marginBottom:14,border:'1px solid #E8E8E8'}}>
      <div style={{fontSize:11,fontWeight:700,color:'#666',letterSpacing:'.1em',marginBottom:8}}>MÉTÉO MARINE — CÔTE BLEUE</div>
      <div style={{fontSize:12,color:'#AAA',textAlign:'center',padding:'8px 0'}}>Chargement des données…</div>
    </div>
  );

  const fc=bftColor(w.wind);
  return(
    <div style={{background:'white',borderRadius:12,padding:14,marginBottom:14,border:'1px solid #E8E8E8',overflow:'hidden'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>

const ZONE_DEFAULT=[43.33,5.03]; // Carro / Côte Bleue

async function geocode(name){
  try{
    const q=encodeURIComponent(name+', France, Méditerranée');
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`,{headers:{'Accept-Language':'fr'}});
    const d=await r.json();
    if(d[0])return[parseFloat(d[0].lat),parseFloat(d[0].lon)];
  }catch{}
  return null;
}

function RouteMap({waypoints,date}){
  const mapRef=React.useRef(null);
  const mapInstance=React.useRef(null);
  const[loading,setLoading]=useState(true);
  const[coords,setCoords]=useState([]);
  const[error,setError]=useState(false);

  useEffect(()=>{
    if(!waypoints?.length)return;
    let cancelled=false;
    (async()=>{
      setLoading(true);
      const results=await Promise.all(waypoints.map(w=>geocode(w)));
      if(cancelled)return;
      const valid=results.filter(Boolean);
      if(valid.length<1){setError(true);setLoading(false);return;}
      setCoords(valid);
      setLoading(false);
    })();
    return()=>{cancelled=true;};
  },[waypoints?.join('|')]);

  useEffect(()=>{
    if(!mapRef.current||coords.length<1||loading)return;
    // Destroy previous instance
    if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}
    const center=coords.length===1?coords[0]:coords[Math.floor(coords.length/2)];
    const map=L.map(mapRef.current,{zoomControl:true,attributionControl:false}).setView(center,11);
    mapInstance.current=map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    // Markers
    const icons={
      start:L.divIcon({className:'',html:'<div style="background:#2E7D32;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)">⚓</div>',iconSize:[28,28],iconAnchor:[14,14]}),
      end:L.divIcon({className:'',html:'<div style="background:#C62828;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)">🏁</div>',iconSize:[28,28],iconAnchor:[14,14]}),
      mid:L.divIcon({className:'',html:'<div style="background:#1565C0;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid white;box-shadow:0 2px 4px rgba(0,0,0,.3)">⚡</div>',iconSize:[22,22],iconAnchor:[11,11]}),
    };
    coords.forEach((c,i)=>{
      const icon=i===0?icons.start:i===coords.length-1?icons.end:icons.mid;
      const label=waypoints[i]||'';
      L.marker(c,{icon}).addTo(map).bindPopup(`<b>${label}</b>`);
    });
    if(coords.length>1){
      L.polyline(coords,{color:'#1565C0',weight:3,opacity:.8,dashArray:'8,6'}).addTo(map);
      map.fitBounds(L.latLngBounds(coords).pad(0.3));
    }
    return()=>{if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}};
  },[coords,loading]);

  // Google Maps URL
  const gmUrl=waypoints?.length?`https://www.google.com/maps/dir/${waypoints.map(w=>encodeURIComponent(w+' France')).join('/')}`:null;

  if(!waypoints?.length)return null;

  return(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:10,fontWeight:700,color:'#888',letterSpacing:'.1em',marginBottom:8}}>TRACÉ DU PARCOURS</div>
      <div style={{background:'white',borderRadius:12,border:'1px solid #E8E8E8',overflow:'hidden'}}>
        {/* Waypoints pills */}

function TripDetail({trip,onBack,onEdit,onDelete}){
  const dur=trip.engineStart&&trip.engineEnd?Math.max(0,(parseFloat(trip.engineEnd)-parseFloat(trip.engineStart))).toFixed(1):null;
  const depOk=CHECK_DEP.filter(i=>trip.checkDep?.[i]).length;
  const retOk=CHECK_RET.filter(i=>trip.checkRet?.[i]).length;
  return(
    <div style={{padding:16}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{background:'none',border:'1px solid #D0D0D0',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13}}>← Retour</button>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>{trip.route||'Sortie'}</div>
            <div style={{fontSize:12,color:'#888'}}>{new Date(trip.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={onEdit} style={btn('#E8F0FF','#1A3A8F')}>Modifier</button>
          <button onClick={onDelete} style={btn('#FFEBEE','#C62828')}>Suppr.</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {trip.departTime&&<Mini icon="🕐" label="Départ" val={trip.departTime}/>}
        {trip.returnTime&&<Mini icon="🏁" label="Retour" val={trip.returnTime}/>}
        {dur&&<Mini icon="⏱️" label="Moteur" val={`${dur}h`}/>}
        {trip.crew?.length>0&&<Mini icon="👥" label="Équipage" val={`${trip.crew.length} pers.`}/>}
      </div>
      {trip.crew?.length>0&&<Bloc label="ÉQUIPAGE"><p style={{margin:0,fontSize:13}}>{trip.crew.join(' · ')}</p></Bloc>}
      {trip.waypoints?.length>0&&<RouteMap waypoints={trip.waypoints} date={trip.date}/>}
      {(trip.windForce||trip.seaState||trip.weather)&&<Bloc label="MÉTÉO">
        {trip.windForce&&<p style={{margin:'0 0 4px',fontSize:13}}>💨 {trip.windForce}</p>}
        {trip.seaState&&<p style={{margin:'0 0 4px',fontSize:13}}>🌊 {trip.seaState}</p>}
        {trip.weather&&<p style={{margin:0,fontSize:13,color:'#555'}}>{trip.weather}</p>}
      </Bloc>}
      {(depOk||retOk)&&<Bloc label="CHECKLISTS"><div style={{display:'flex',gap:16,fontSize:13}}><div>✅ Départ : <strong>{depOk}/{CHECK_DEP.length}</strong></div><div>✅ Retour : <strong>{retOk}/{CHECK_RET.length}</strong></div></div></Bloc>}
      {trip.notes&&<Bloc label="NOTES"><p style={{margin:0,fontSize:13,lineHeight:1.7,color:'#555'}}>{trip.notes}</p></Bloc>}
    </div>
  );
}

function Mini({icon,label,val}){return<div style={{background:'white',borderRadius:10,padding:'10px 12px',border:'1px solid #E8E8E8'}}><div style={{fontSize:18}}>{icon}</div><div style={{fontSize:10,color:'#888',marginTop:3}}>{label}</div><div style={{fontSize:14,fontWeight:700,marginTop:1}}>{val}</div></div>;}
function Bloc({label,children}){return<div style={{marginBottom:14}}><div style={{fontSize:10,fontWeight:700,color:'#888',letterSpacing:'.1em',marginBottom:6}}>{label}</div><div style={{background:'white',borderRadius:10,padding:'12px 14px',border:'1px solid #E8E8E8'}}>{children}</div></div>;}

function ExpenseForm({expense,onSave,onCancel,boatCode}){
  const today=new Date().toISOString().slice(0,10);
  const[f,setF]=useState(expense||{date:today,category:'fuel',paymentMode:'total',totalAmount:'',amount:'',paymentPercent:'',description:'',paidBy:'commun',invoiceUrl:''});
  const[uploadingPdf,setUploadingPdf]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  // Auto-calcul du montant si mode pourcentage
  const handlePercent=v=>{
    set('paymentPercent',v);
    if(f.totalAmount&&v){set('amount',(parseFloat(f.totalAmount)*parseFloat(v)/100).toFixed(2));}
  };
  const handleTotalForPercent=v=>{
    set('totalAmount',v);
    if(f.paymentPercent&&v){set('amount',(parseFloat(v)*parseFloat(f.paymentPercent)/100).toFixed(2));}
  };

  const handlePDF=async file=>{
    if(!file)return;
    setUploadingPdf(true);
    try{
      const id=f.id||uid();
      if(!f.id)setF(p=>({...p,id}));
      const path=`${boatCode}/${id}.pdf`;
      const{error}=await db.storage.from('factures').upload(path,file,{upsert:true,contentType:'application/pdf'});
      if(!error){
        const{data:{publicUrl}}=db.storage.from('factures').getPublicUrl(path);
        set('invoiceUrl',publicUrl);
      }
    }catch(e){console.error(e);}
    setUploadingPdf(false);
  };

  const amountLabel=f.paymentMode==='acompte'?'Acompte versé (€)':f.paymentMode==='pourcentage'?'Montant calculé (€)':'Montant total (€)';
  const amountReadOnly=f.paymentMode==='pourcentage';

  return(
    <div style={{padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={onCancel} style={{background:'none',border:'1px solid #D0D0D0',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13}}>← Retour</button>
        <div style={{fontSize:16,fontWeight:700}}>{expense?'Modifier la dépense':'Nouvelle dépense'}</div>
      </div>

      <Sec label="CATÉGORIE">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          {CATS.map(c=><button key={c.id} onClick={()=>set('category',c.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 6px',borderRadius:10,border:`2px solid ${f.category===c.id?c.fg:'#E0E0E0'}`,background:f.category===c.id?c.bg:'transparent',cursor:'pointer',fontFamily:'inherit'}}><span style={{fontSize:22}}>{c.icon}</span><span style={{fontSize:10,fontWeight:600,color:f.category===c.id?c.fg:'#888'}}>{c.label}</span></button>)}
        </div>
      </Sec>

      <Sec label="MODE DE PAIEMENT">
        <div style={{display:'flex',gap:8}}>
          {[['total','💳 Total'],['acompte','⚡ Acompte'],['pourcentage','% Partiel']].map(([v,l])=>(
            <button key={v} onClick={()=>set('paymentMode',v)} style={{flex:1,padding:'9px 4px',borderRadius:10,border:`2px solid ${f.paymentMode===v?'#0B2845':'#E0E0E0'}`,background:f.paymentMode===v?'#0B2845':'transparent',color:f.paymentMode===v?'white':'#555',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}}>{l}</button>
          ))}
        </div>
        {f.paymentMode!=='total'&&(
          <div style={{background:'#FFF3E0',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#E65100'}}>
            {f.paymentMode==='acompte'?'Entrez le montant total de la facture et l\'acompte versé.':'Entrez le montant total et le pourcentage réglé — le montant est calculé automatiquement.'}
          </div>
        )}
      </Sec>

      <Sec label="MONTANTS">
        {f.paymentMode!=='total'&&(
          <Fld label="Montant total de la facture (€)">
            <input type="number" step="0.01" value={f.totalAmount} onChange={e=>f.paymentMode==='pourcentage'?handleTotalForPercent(e.target.value):set('totalAmount',e.target.value)} placeholder="0.00" style={{...inp,fontSize:20,fontWeight:700,padding:'12px 14px'}}/>
          </Fld>
        )}
        {f.paymentMode==='pourcentage'&&(
          <Fld label="Pourcentage réglé (%)">
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="number" step="1" min="1" max="100" value={f.paymentPercent} onChange={e=>handlePercent(e.target.value)} placeholder="ex: 30" style={{...inp,fontSize:18,fontWeight:700}}/>
              <div style={{fontSize:14,color:'#888',flexShrink:0}}>%</div>
            </div>
          </Fld>
        )}
        <Fld label={amountLabel}>
          <input type="number" step="0.01" value={f.amount} onChange={e=>!amountReadOnly&&set('amount',e.target.value)} placeholder="0.00" readOnly={amountReadOnly} style={{...inp,fontSize:20,fontWeight:700,padding:'12px 14px',background:amountReadOnly?'#F5F5F5':'#FAFAFA',color:amountReadOnly?'#888':'#1A1A1A'}}/>
        </Fld>
        {f.paymentMode!=='total'&&f.totalAmount&&f.amount&&parseFloat(f.totalAmount)>parseFloat(f.amount)&&(
          <div style={{background:'#FFF3E0',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#E65100',fontWeight:600}}>
            💰 Reste à régler : {(parseFloat(f.totalAmount)-parseFloat(f.amount)).toFixed(2)} €
          </div>
        )}
        <Fld label="Date"><input type="date" value={f.date} onChange={e=>set('date',e.target.value)} style={inp}/></Fld>
        <Fld label="Description"><input type="text" value={f.description} onChange={e=>set('description',e.target.value)} placeholder="Plein de gazole, vidange 300h…" style={inp}/></Fld>
      </Sec>

      <Sec label="FACTURE PDF">
        <div style={{background:'white',borderRadius:10,border:'1px solid #E0E0E0',padding:'12px 14px'}}>
          {f.invoiceUrl?(
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:28}}>📄</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:'#2E7D32'}}>Facture enregistrée</div>
                <a href={f.invoiceUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:12,color:'#1565C0',textDecoration:'none',fontWeight:600}}>Ouvrir la facture →</a>
              </div>
              <label style={{cursor:'pointer'}}>
                <input type="file" accept="application/pdf" style={{display:'none'}} onChange={e=>handlePDF(e.target.files[0])} disabled={uploadingPdf}/>
                <div style={{padding:'6px 10px',borderRadius:8,background:'#EBF0FF',color:'#1A3A8F',fontSize:11,fontWeight:700}}>{uploadingPdf?'⏳ Envoi…':'Remplacer'}</div>
              </label>
            </div>
          ):(
            <label style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}>
              <input type="file" accept="application/pdf" style={{display:'none'}} onChange={e=>handlePDF(e.target.files[0])} disabled={uploadingPdf}/>
              <span style={{fontSize:28}}>📎</span>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:uploadingPdf?'#888':'#0B2845'}}>{uploadingPdf?'⏳ Envoi en cours…':'Joindre la facture (PDF)'}</div>
                <div style={{fontSize:11,color:'#999',marginTop:2}}>Sélectionnez un fichier PDF depuis votre téléphone</div>
              </div>
              {!uploadingPdf&&<div style={{padding:'8px 12px',borderRadius:8,background:'#EBF0FF',color:'#1A3A8F',fontSize:12,fontWeight:700,flexShrink:0}}>📂 Parcourir</div>}
            </label>
          )}
        </div>
      </Sec>

      <Sec label="PAYÉ PAR">
        <div style={{display:'flex',gap:8}}>
          {[['commun','Commun'],['stephane','Stéphane'],['olivier','Olivier'],['lubin','Lubin']].map(([v,l])=>(
            <button key={v} onClick={()=>set('paidBy',v)} style={{flex:1,padding:'9px 4px',borderRadius:10,border:`2px solid ${f.paidBy===v?'#0B2845':'#E0E0E0'}`,background:f.paidBy===v?'#0B2845':'transparent',color:f.paidBy===v?'white':'#555',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}}>{l}</button>
          ))}
        </div>
      </Sec>

      <button onClick={()=>onSave(f)} disabled={!f.amount} style={{...btn(f.amount?'#0B2845':'#CCC',f.amount?'white':'#999'),width:'100%',padding:14,fontSize:14,borderRadius:12,marginTop:4,cursor:f.amount?'pointer':'default'}}>
        ✓ {expense?'Enregistrer les modifications':'Enregistrer la dépense'}
      </button>
    </div>
  );
}

const SPECS_KEY='leader805_specs';
const MOUILLAGES_KEY='leader805_mouillages';
const DOCPHOTOS_KEY='leader805_doc_photos';
const DEFAULT_SPECS=Object.fromEntries(BOAT_SPECS.map(([k,v])=>[k,v]));
const DEFAULT_MOUILLAGES=MOUILLAGES.map((m,i)=>({...m,id:'m'+i,phone:''}));

function AdminTab({docs,upsertDoc,deleteDoc}){
  const[subTab,setSubTab]=useState('docs');
  const[viewing,setViewing]=useState(null);
  const[uploading,setUploading]=useState(null);
  const[editingSpecs,setEditingSpecs]=useState(false);
  // Photos stockées localement sur l'appareil (localStorage)
  const[docPhotos,setDocPhotos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(DOCPHOTOS_KEY)||'{}');}catch{return {};}
  });
  const[specValues,setSpecValues]=useState(()=>{
    try{const s=localStorage.getItem(SPECS_KEY);return s?JSON.parse(s):DEFAULT_SPECS;}catch{return DEFAULT_SPECS;}
  });
  const[mouillages,setMouillages]=useState(()=>{
    try{const s=localStorage.getItem(MOUILLAGES_KEY);return s?JSON.parse(s):DEFAULT_MOUILLAGES;}catch{return DEFAULT_MOUILLAGES;}
  });
  const[mouilForm,setMouilForm]=useState(null); // null=list, {}=new, {...}=edit
  const[mouilUploading,setMouilUploading]=useState(false);

  const saveMouillages=list=>{setMouillages(list);localStorage.setItem(MOUILLAGES_KEY,JSON.stringify(list));};
  const saveSpecs=()=>{localStorage.setItem(SPECS_KEY,JSON.stringify(specValues));setEditingSpecs(false);};
  const cancelSpecs=()=>{try{const s=localStorage.getItem(SPECS_KEY);setSpecValues(s?JSON.parse(s):DEFAULT_SPECS);}catch{setSpecValues(DEFAULT_SPECS);}setEditingSpecs(false);};

  const handleFile=async(predoc,file,side)=>{
    if(!file)return;
    setUploading(predoc.id+side);
    const photo=await compressImage(file);
    const field=side==='recto'?'photo_recto':'photo_verso';
    // Sauvegarde locale immédiate (source de vérité)
    const updated={...docPhotos,[predoc.id]:{...(docPhotos[predoc.id]||{}),[field]:photo}};
    setDocPhotos(updated);
    localStorage.setItem(DOCPHOTOS_KEY,JSON.stringify(updated));
    // Tentative sync Supabase (optionnel — nécessite les colonnes SQL)
    try{
      const saved=docs.find(d=>d.id===predoc.id)||{};
      await upsertDoc({id:predoc.id,name:predoc.name,icon:predoc.icon,...saved,[field]:photo});
    }catch{}
    setUploading(null);
  };

  const handleDeleteDoc=(id)=>{
    // Supprime photos locales
    const updated={...docPhotos};
    delete updated[id];
    setDocPhotos(updated);
    localStorage.setItem(DOCPHOTOS_KEY,JSON.stringify(updated));
    // Supprime dans Supabase
    deleteDoc(id);
  };

  const handleMouilPhoto=async(file)=>{
    if(!file)return;
    setMouilUploading(true);
    const photo=await compressImage(file);
    setMouilForm(p=>({...p,photo}));
    setMouilUploading(false);
  };

  const saveMouil=()=>{
    if(!mouilForm.name?.trim())return;
    if(mouilForm.id&&mouillages.find(m=>m.id===mouilForm.id)){
      saveMouillages(mouillages.map(m=>m.id===mouilForm.id?mouilForm:m));
    }else{
      saveMouillages([...mouillages,{...mouilForm,id:'m'+Date.now()}]);
    }
    setMouilForm(null);
  };

  const SubBtn=({id,label})=>(
    <button onClick={()=>setSubTab(id)} style={{flex:1,padding:9,borderRadius:10,border:'none',background:subTab===id?'#0B2845':'#EBEBEB',color:subTab===id?'white':'#555',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit'}}>{label}</button>
  );

  const PhotoSlot=({predoc,side,label})=>{
    const field=side==='recto'?'photo_recto':'photo_verso';
    const photo=docPhotos[predoc.id]?.[field];
    const isUp=uploading===predoc.id+side;
    return(
      <div style={{flex:1,background:'#F8F8F8',borderRadius:10,padding:10,border:'1px solid #EEE'}}>
        <div style={{fontSize:10,fontWeight:700,color:'#888',marginBottom:6,letterSpacing:'.06em'}}>{label}</div>
        {photo?(
          <>
            <img src={photo} onClick={()=>setViewing({name:`${predoc.name} — ${label}`,photo})} style={{width:'100%',height:72,objectFit:'cover',borderRadius:8,cursor:'pointer',display:'block',marginBottom:6}} alt={label}/>
            <label style={{cursor:'pointer',display:'block'}}>
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleFile(predoc,e.target.files[0],side)} disabled={isUp}/>
              <div style={{textAlign:'center',fontSize:10,fontWeight:700,color:'#2E7D32',padding:'4px 0'}}>{isUp?'⏳ Envoi…':'📷 Remplacer'}</div>
            </label>
          </>
        ):(
          <label style={{cursor:'pointer',display:'block'}}>
            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleFile(predoc,e.target.files[0],side)} disabled={isUp}/>
            <div style={{height:72,border:'1.5px dashed #C0C0C0',borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
              {isUp?<span style={{fontSize:12,color:'#888'}}>⏳ Envoi…</span>:<><span style={{fontSize:22}}>📷</span><span style={{fontSize:10,color:'#999'}}>Ajouter</span></>}
            </div>
          </label>
        )}
      </div>
    );
  };

  // ── Mouillage form ────────────────────────────────────────────────────────
  if(mouilForm!==null)return(
    <div style={{padding:16}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>setMouilForm(null)} style={{background:'none',border:'1px solid #D0D0D0',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:13}}>← Retour</button>
        <div style={{fontSize:16,fontWeight:700}}>{mouilForm.id&&mouillages.find(m=>m.id===mouilForm.id)?'Modifier':'Nouveau mouillage'}</div>
      </div>
      <Sec label="INFORMATIONS">
        <Fld label="Nom du mouillage">
          <input type="text" value={mouilForm.name||''} onChange={e=>setMouilForm(p=>({...p,name:e.target.value}))} placeholder="Calanque de Niolon" style={inp}/>
        </Fld>
        <div style={{display:'grid',gridTemplateColumns:'80px 1fr',gap:10}}>
          <Fld label="Icône">
            <input type="text" value={mouilForm.icon||''} onChange={e=>setMouilForm(p=>({...p,icon:e.target.value}))} placeholder="🏖️" style={{...inp,fontSize:24,textAlign:'center'}}/>
          </Fld>
          <Fld label="Zone / Distance">
            <input type="text" value={mouilForm.dist||''} onChange={e=>setMouilForm(p=>({...p,dist:e.target.value}))} placeholder="~8 mn de Carro" style={inp}/>
          </Fld>
        </div>
        <Fld label="Téléphone (port / capitainerie)">
          <input type="tel" value={mouilForm.phone||''} onChange={e=>setMouilForm(p=>({...p,phone:e.target.value}))} placeholder="04 42 ..." style={inp}/>
        </Fld>
        <Fld label="Notes (fond, accès, conseils)">
          <textarea value={mouilForm.note||''} onChange={e=>setMouilForm(p=>({...p,note:e.target.value}))} placeholder="Fond sable, bonne tenue. Arriver tôt en été." style={{...inp,minHeight:80,resize:'vertical'}}/>
        </Fld>
      </Sec>
      <Sec label="PHOTO DU MOUILLAGE">
        {mouilForm.photo?(
          <div>
            <img src={mouilForm.photo} style={{width:'100%',height:160,objectFit:'cover',borderRadius:10,marginBottom:8}} alt="mouillage"/>
            <label style={{cursor:'pointer',display:'block',textAlign:'center'}}>
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleMouilPhoto(e.target.files[0])} disabled={mouilUploading}/>
              <div style={{fontSize:12,color:'#1565C0',fontWeight:600}}>{mouilUploading?'⏳ Compression…':'📷 Changer la photo'}</div>
            </label>
          </div>
        ):(
          <label style={{cursor:'pointer',display:'block'}}>
            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleMouilPhoto(e.target.files[0])} disabled={mouilUploading}/>
            <div style={{height:120,border:'1.5px dashed #C0C0C0',borderRadius:10,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,background:'#F8F8F8'}}>
              {mouilUploading?<span style={{fontSize:13,color:'#888'}}>⏳ Compression…</span>:<><span style={{fontSize:36}}>📷</span><span style={{fontSize:12,color:'#999'}}>Ajouter une photo</span></>}
            </div>
          </label>
        )}
      </Sec>
      <button onClick={saveMouil} disabled={!mouilForm.name?.trim()} style={{...btn(mouilForm.name?.trim()?'#0B2845':'#CCC','white'),width:'100%',padding:14,fontSize:14,borderRadius:12,marginTop:4}}>
        ✓ Enregistrer le mouillage
      </button>
    </div>
  );

  return(
    <div style={{padding:16}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Administratif</div>
      <div style={{background:'linear-gradient(135deg,#0B2845,#1A4A7A)',borderRadius:14,padding:'14px 16px',marginBottom:16,color:'white'}}>
        <div style={{fontSize:10,opacity:.7,letterSpacing:'.1em',marginBottom:4}}>ZONE DE NAVIGATION</div>
        <div style={{fontSize:15,fontWeight:700}}>Côte Bleue · Marseille · Calanques</div>
        <div style={{fontSize:12,opacity:.8,marginTop:3}}>Jusqu'à Toulon · Porquerolles · Météo : Zone Lion</div>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <SubBtn id="docs" label="📸 Docs"/>
        <SubBtn id="specs" label="🚢 Fiche"/>
        <SubBtn id="mouillages" label="⚓ Mouillages"/>
      </div>

      {/* DOCUMENTS */}
      {subTab==='docs'&&(
        <>
          <div style={{fontSize:11,fontWeight:700,color:'#666',letterSpacing:'.1em',marginBottom:4}}>DOCUMENTS DU BORD</div>
          <div style={{fontSize:11,color:'#999',marginBottom:12}}>Recto et verso — appuyez sur une photo pour agrandir</div>
          {[
            {id:'permis_stephane', name:'Permis côtier — Stéphane', icon:'🪪'},
            {id:'permis_olivier',  name:'Permis côtier — Olivier',  icon:'🪪'},
            {id:'assurance',       name:'Assurance bateau',         icon:'🛡️'},
            {id:'francisation',    name:'Acte de francisation',     icon:'📄'},
            {id:'immatriculation', name:"Certificat d'immatriculation", icon:'🧾'},
            {id:'vhf',             name:'Licence VHF',              icon:'📻'},
            {id:'ce',              name:'Certificat CE',            icon:'🔎'},
            {id:'carte',           name:'Carte de navigation',      icon:'🗺️'},
          ].map(predoc=>{
            const saved=docs.find(d=>d.id===predoc.id);
            const hasAny=docPhotos[predoc.id]?.photo_recto||docPhotos[predoc.id]?.photo_verso;
            return(
              <div key={predoc.id} style={{background:'white',borderRadius:12,border:'1px solid #E8E8E8',marginBottom:10,overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px 8px'}}>
                  <span style={{fontSize:24,flexShrink:0}}>{predoc.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{predoc.name}</div>
                    <div style={{fontSize:11,color:hasAny?'#2E7D32':'#999',marginTop:2}}>
                      {docPhotos[predoc.id]?.photo_recto&&docPhotos[predoc.id]?.photo_verso?'✅ Recto + Verso':docPhotos[predoc.id]?.photo_recto?'⚠️ Recto seulement':docPhotos[predoc.id]?.photo_verso?'⚠️ Verso seulement':'Aucune photo'}
                    </div>
                  </div>
                  {hasAny&&<button onClick={()=>handleDeleteDoc(predoc.id)} style={{background:'#FFEBEE',border:'none',borderRadius:6,padding:'6px 10px',cursor:'pointer',fontSize:11,color:'#C62828'}}>✕ Suppr.</button>}
                </div>
                <div style={{display:'flex',gap:8,padding:'0 14px 12px'}}>
                  <PhotoSlot predoc={predoc} side="recto" label="RECTO"/>
                  <PhotoSlot predoc={predoc} side="verso" label="VERSO"/>
                </div>
              </div>
            );
          })}
        </>
      )}

      {/* FICHE TECHNIQUE */}
      {subTab==='specs'&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#666',letterSpacing:'.1em'}}>FICHE TECHNIQUE</div>
          {editingSpecs?(
            <div style={{display:'flex',gap:8}}>
              <button onClick={cancelSpecs} style={{padding:'6px 12px',borderRadius:8,background:'#F0F0F0',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:'#555',fontFamily:'inherit'}}>Annuler</button>
              <button onClick={saveSpecs} style={{padding:'6px 12px',borderRadius:8,background:'#0B2845',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:'white',fontFamily:'inherit'}}>✓ Enregistrer</button>
            </div>
          ):(
            <button onClick={()=>setEditingSpecs(true)} style={{padding:'6px 12px',borderRadius:8,background:'#EBF0FF',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:'#1A3A8F',fontFamily:'inherit'}}>✏️ Modifier</button>
          )}
        </div>
        <div style={{background:'white',borderRadius:12,border:'1px solid #E8E8E8',overflow:'hidden',marginBottom:editingSpecs?12:0}}>
          {BOAT_SPECS.map(([k],i)=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:editingSpecs?'8px 14px':'11px 14px',background:i%2===0?'white':'#FAFAFA',borderBottom:i<BOAT_SPECS.length-1?'1px solid #F0F0F0':'none',fontSize:13,gap:12}}>
              <span style={{color:'#888',flexShrink:0,minWidth:110}}>{k}</span>
              {editingSpecs?(
                <input value={specValues[k]||''} onChange={e=>setSpecValues(p=>({...p,[k]:e.target.value}))}
                  style={{...inp,padding:'6px 10px',fontSize:13,textAlign:'right',flex:1,background:'#F8F8F8'}}/>
              ):(
                <span style={{fontWeight:600,textAlign:'right'}}>{specValues[k]}</span>
              )}
            </div>
          ))}
        </div>
        {editingSpecs&&<div style={{fontSize:11,color:'#888',textAlign:'center',padding:'4px 0 8px'}}>Sauvegardé sur cet appareil</div>}
      </>}

      {/* MOUILLAGES */}
      {subTab==='mouillages'&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:'#666',letterSpacing:'.1em'}}>MOUILLAGES FAVORIS ({mouillages.length})</div>
          <button onClick={()=>setMouilForm({name:'',icon:'🏖️',dist:'',note:'',phone:'',photo:''})} style={{...btn(),fontSize:12,padding:'7px 14px'}}>+ Ajouter</button>
        </div>
        {mouillages.map(m=>(
          <div key={m.id} style={{background:'white',borderRadius:12,border:'1px solid #E8E8E8',marginBottom:10,overflow:'hidden'}}>
            {m.photo&&<img src={m.photo} style={{width:'100%',height:120,objectFit:'cover',display:'block',cursor:'pointer'}} onClick={()=>setViewing({name:m.name,photo:m.photo})} alt={m.name}/>}
            <div style={{padding:'12px 14px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:22}}>{m.icon||'⚓'}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{m.name}</div>
                    {m.dist&&<div style={{fontSize:10,color:'#1565C0',fontWeight:600}}>{m.dist}</div>}
                  </div>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>setMouilForm(m)} style={{background:'#EBF0FF',border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:12,color:'#1A3A8F'}}>✏️</button>
                  <button onClick={()=>saveMouillages(mouillages.filter(x=>x.id!==m.id))} style={{background:'#FFEBEE',border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',fontSize:12,color:'#C62828'}}>✕</button>
                </div>
              </div>
              {m.note&&<div style={{fontSize:12,color:'#666',lineHeight:1.6,marginBottom:m.phone?8:0}}>{m.note}</div>}
              {m.phone&&(
                <a href={`tel:${m.phone.replace(/\s/g,'')}`} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#0B2845',textDecoration:'none',fontWeight:600,marginTop:6,padding:'7px 10px',background:'#E8F0FF',borderRadius:8}}>
                  <span>📞</span>{m.phone}
                </a>
              )}
            </div>
          </div>
        ))}
        {!mouillages.length&&<div style={{textAlign:'center',padding:40,color:'#888'}}><div style={{fontSize:36,marginBottom:8}}>⚓</div><div style={{fontSize:13}}>Aucun mouillage enregistré</div></div>}
      </>}

      {/* Fullscreen viewer */}
      {viewing&&(
        <div onClick={()=>setViewing(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:1000,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
          <div style={{color:'white',fontSize:14,fontWeight:600,marginBottom:16,textAlign:'center'}}>{viewing.name}</div>
          <img src={viewing.photo} style={{maxWidth:'100%',maxHeight:'75vh',borderRadius:12,objectFit:'contain'}} alt={viewing.name}/>
          <button onClick={()=>setViewing(null)} style={{marginTop:24,padding:'12px 32px',borderRadius:24,background:'white',border:'none',cursor:'pointer',fontSize:14,fontWeight:700,color:'#0B2845'}}>Fermer</button>
        </div>
      )}
    </div>
  );
}


// ── Emergency ─────────────────────────────────────────────────────────────────
function EmergencyTab(){
  return(
    <div style={{padding:16}}>
      <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Urgences</div>
      <div style={{fontSize:12,color:'#888',marginBottom:12}}>Zone : Côte Bleue · Marseille · Toulon · Porquerolles</div>
      <div style={{background:'#C62828',borderRadius:12,padding:'14px 16px',marginBottom:16,color:'white',display:'flex',gap:14,alignItems:'center'}}>
        <span style={{fontSize:36}}>🚨</span>
        <div><div style={{fontSize:14,fontWeight:700}}>DÉTRESSE EN MER</div><div style={{fontSize:12,marginTop:4,opacity:.9}}>Appelez le <strong>196</strong> ou MAYDAY canal 16 VHF</div></div>
      </div>
      {EMERGENCY.map((c,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'white',border:'1px solid #E8E8E8',borderRadius:12,marginBottom:8}}>
          <span style={{fontSize:24,flexShrink:0}}>{c.icon}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700}}>{c.name}</div>
            {c.note&&<div style={{fontSize:10,color:'#999'}}>{c.note}</div>}
            {c.num?<a href={`tel:${c.num.replace(/\s/g,'')}`} style={{fontSize:17,fontWeight:700,color:c.color,textDecoration:'none'}}>{c.num}</a>:<div style={{fontSize:12,color:'#AAA',fontStyle:'italic'}}>À renseigner</div>}
          </div>
          {c.num&&<a href={`tel:${c.num.replace(/\s/g,'')}`} style={{width:42,height:42,borderRadius:21,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',textDecoration:'none',fontSize:20,flexShrink:0}}>☎</a>}
        </div>
      ))}
      <div style={{background:'#E0F2F1',borderRadius:12,padding:'12px 14px',marginTop:4,fontSize:12,color:'#00695C',lineHeight:1.7}}>
        <strong>Canal 16 VHF</strong> — Veille obligatoire en mer<br/>
        <strong>Météo Lion</strong> — Bulletins VHF à 0633, 1133, 1633, 2133
      </div>
    </div>
  );
}

// ── Shared ─────────────────────────────────────────────────────────────────────
function Sec({label,children}){return<div style={{marginBottom:20}}><div style={{fontSize:10,fontWeight:700,color:'#888',letterSpacing:'.1em',marginBottom:10}}>{label}</div><div style={{display:'flex',flexDirection:'column',gap:10}}>{children}</div></div>;}
function Fld({label,children}){return<div><div style={{fontSize:12,color:'#666',marginBottom:4,fontWeight:500}}>{label}</div>{children}</div>;}

// ── Render ──────────────────────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
